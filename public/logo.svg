  <polygon points="15,22 25,13 39,13 49,22" fill="#B3E5FC" stroke="#222" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Нижний треугольник -->
  <polygon points="15,22 49,22 32,50" fill="#4FC3F7" stroke="#222" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- Внутренние грани верха -->
  <line x1="25" y1="13" x2="22" y2="22" stroke="#222" stroke-width="0.6"/>
  <line x1="32" y1="13" x2="32" y2="22" stroke="#222" stroke-width="0.6"/>
  <line x1="39" y1="13" x2="42" y2="22" stroke="#222" stroke-width="0.6"/>

  <!-- Внутренние грани низа -->
  <line x1="22" y1="22" x2="32" y2="50" stroke="#222" stroke-width="0.6"/>
  <line x1="32" y1="22" x2="32" y2="50" stroke="#222" stroke-width="0.6"/>
  <line x1="42" y1="22" x2="32" y2="50" stroke="#222" stroke-width="0.6"/>

  <!-- Тонкие диагонали на верхних гранях (как на картинке) -->
